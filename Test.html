<body>

        <div class="relative mb-8">

        </div>
        <p class="text-purple-500 font-black tracking-[0.6em] text-[10px] uppercase italic animate-pulse">Entering Empire…</p>
    </div>

    <div id="toast">Added to bag</div>

    <div id="main-content">
        <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-2xl border-b border-white/5 px-6 pb-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="nav-logo" src="" class="w-10 h-10 rounded-full object-cover border border-purple-600/30" alt="Fares King" crossorigin="anonymous">
                <div>
                    <p class="text-[9px] text-purple-500 font-black uppercase tracking-widest mb-1">Supermarket</p>
                    <h1 class="font-black italic text-lg uppercase tracking-tighter leading-none">Fares King</h1>
                </div>
            </div>
            <button onclick="toggleCart()" class="w-12 h-12 bg-white/5 rounded-2xl relative border border-white/10 flex items-center justify-center tap-active">
                <i class="fas fa-shopping-bag text-lg"></i>
                <span id="cart-count" class="hidden absolute -top-1 -right-1 bg-purple-600 text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">0</span>
            </button>
        </nav>

        <main class="pt-32 pb-32">
            <header class="px-6 mb-8">
                <h2 class="text-5xl font-black italic uppercase tracking-tighter leading-none">OUR <span class="king-gradient">PRODUCTS</span></h2>
            </header>

            <div class="flex px-6 gap-8 mb-8">
                <button onclick="setTab('all')" id="tab-all" class="tab-btn active text-[10px] font-black uppercase tracking-widest text-white/40">All Items</button>
                <button onclick="setTab('boba')" id="tab-boba" class="tab-btn text-[10px] font-black uppercase tracking-widest text-white/40">Boba Drinks</button>
                <button onclick="setTab('snacks')" id="tab-snacks" class="tab-btn text-[10px] font-black uppercase tracking-widest text-white/40">Snacks</button>
            </div>

            <div id="snack-grid" class="px-4 space-y-8"></div>
        </main>
    </div>

    <div id="receipt-view" class="hidden min-h-screen pt-32 px-6 pb-20 bg-[#050505]">
        <div id="receipt-card-container"></div>
        <button onclick="window.location.href=window.location.origin+window.location.pathname" class="w-full mt-10 text-[10px] font-black uppercase text-white/20 tracking-[0.5em] italic">Close Receipt</button>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden opacity-0 transition-opacity duration-500" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 w-full max-w-lg h-full bg-[#080808] z-[101] cart-sidebar flex flex-col shadow-2xl">
        <div class="pt-[calc(1.5rem+var(--safe-top))] p-8 flex justify-between items-center border-b border-white/5">
            <h2 class="font-black italic uppercase text-2xl tracking-tighter">Your Bag</h2>
            <button onclick="toggleCart()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center tap-active"><i class="fas fa-times"></i></button>
        </div>

        <div id="cart-content-area" class="flex-grow overflow-y-auto p-6">
            <div id="cart-items" class="space-y-4"></div>
            <div id="checkout-fields" class="hidden space-y-6 pt-4">
                <div class="bg-white/5 p-6 rounded-[2rem] border border-white/5 space-y-6">
                    <input type="text" id="cust-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold text-white">
                    <input type="text" id="cust-grade" placeholder="Grade / Section (e.g. 12-A)" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold text-white">
                    <input type="text" id="cust-date" placeholder="Delivery Day" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 outline-none focus:border-purple-600 font-bold text-white">
                </div>
                <p class="text-[10px] text-white/30 text-center uppercase tracking-widest font-black">Order will be copied to clipboard.<br>Paste it in the group chat!</p>
            </div>
        </div>

        <div class="p-8 pb-[calc(2rem+var(--safe-bottom))] bg-black border-t border-white/5">
            <div class="flex justify-between items-end mb-8 px-2">
                <span class="text-[10px] font-black uppercase text-white/20 tracking-widest">Grand Total</span>
                <span class="text-4xl font-black italic tracking-tighter text-purple-500" id="cart-total">0 AED</span>
            </div>
            <div class="space-y-4">
                <button id="step-btn" onclick="nextStep()" class="w-full py-6 bg-white text-black font-black uppercase italic tracking-widest rounded-[2rem] tap-active disabled:opacity-10">Checkout</button>
                <button id="final-btn" onclick="sendOrder()" class="hidden w-full py-6 bg-purple-600 text-white font-black uppercase italic tracking-widest rounded-[2rem] flex items-center justify-center gap-3 shadow-xl shadow-purple-600/40 tap-active">
                    Copy & Open Chat <i class="fab fa-whatsapp text-lg"></i>
                </button>
                <button id="back-btn" onclick="prevStep()" class="hidden w-full py-2 text-[10px] font-black uppercase text-white/30 tracking-[0.3em]">Back to bag</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fares-king-supermarket';

        // More robust Google Drive proxy
        const getDriveImg = (id) => `https://lh3.googleusercontent.com/d/${id}`;
        
        const LOGO_ID = "1jBkacG_Wj8_o7OcVYp6U1rjVb5iLts6I";
        const WEBAPP_ICON_ID = "19CwRCKQZsmXTUI0DBZtAN4AaUy1zuxdk";
        const GROUP_LINK = "https://chat.whatsapp.com/H0lRM4emjMO4sVlsjyGGlq";

        const snacks = [
            { id: 1, name: "Tiger Fresh Milk", price: 20, img: getDriveImg("19o__91KB2EsotwLSIr0x63ygLdE0QhfR"), desc: "premium fresh milk with tiger sugar stripes and boba", isTiger: true, category: 'boba' },
            { id: 2, name: "Classic Boba Taro", price: 16, img: getDriveImg("1xKAx3WvPkZQ8OHNMYWbNnpR2WpPpEsGy"), desc: "Classic creamy taro with chewy boba pearls", isBoba: true, category: 'boba' },
            { id: 3, name: "Flaming Hot Cheetos", price: 6, img: getDriveImg("1kD2YKFBd8n1vhVJjkP0h4JjqQ63zK0mZ"), desc: "spicy crunchy chips", category: 'snacks' },
            { id: 4, name: "Spicy Popcorn", price: 4, img: getDriveImg("1BJGzA2GC_xCCeEvhirSg4Y8ht14skr-s"), desc: "spicy popcorn", category: 'snacks' },
            { id: 5, name: "Balanced Popcorn", price: 3, img: getDriveImg("1I78L6Tv0T_-zTeQ2UUitxl8Dd_Pbm-sO"), desc: "popcorn", category: 'snacks' }
        ];

        let cart = [];
        let currentTab = 'all';

        function robustCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        }

        window.sendOrder = async () => {
            const name = document.getElementById('cust-name').value;
            const grade = document.getElementById('cust-grade').value;
            const date = document.getElementById('cust-date').value;
            if (!name || !grade) return showToast("Name & Grade Required!");

            const orderId = Math.random().toString(36).substring(2, 8).toUpperCase();
            const orderData = {
                orderId, name, grade, date,
                items: cart.map(c => ({ name: c.name, qty: c.qty, price: c.price })),
                total: cart.reduce((s, i) => s + (i.price * i.qty), 0),
                createdAt: Date.now(),
                expiresAt: Date.now() + (15 * 60 * 60 * 1000)
            };

            try {
                const orderRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId);
                await setDoc(orderRef, orderData);
                const link = `${window.location.origin}${window.location.pathname}?orderId=${orderId}`;
                const msg = `👑 *FARES KING ORDER: ${orderId}*\n👤 *NAME:* ${name}\n📍 *GRADE:* ${grade}\n\n📦 *RECEIPT:*\n${link}`;
                robustCopy(msg);
                showToast("Order Copied!");
                setTimeout(() => window.open(GROUP_LINK, '_top'), 1000);
            } catch (e) { showToast("Error connecting..."); }
        };

        async function checkReceipt() {
            const params = new URLSearchParams(window.location.search);
            const oid = params.get('orderId');
            if (!oid) return false;
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('receipt-view').classList.remove('hidden');
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', oid);
            const snap = await getDoc(docRef);
            if (snap.exists()) {
                const d = snap.data();
                document.getElementById('receipt-card-container').innerHTML = `
                    <div class="bg-white/5 border border-white/10 rounded-[3rem] p-10">
                        <h2 class="text-4xl font-black italic uppercase tracking-tighter mb-10">ORDER <span class="text-white/20">#${d.orderId}</span></h2>
                        <div class="space-y-6 mb-12">
                            <div><p class="text-[9px] font-black uppercase text-white/30 mb-1">Customer</p><p class="text-2xl font-bold">${d.name}</p></div>
                            <div><p class="text-[9px] font-black uppercase text-white/30 mb-1">Grade</p><p class="text-2xl font-bold">${d.grade}</p></div>
                        </div>
                        <div class="border-t border-white/10 pt-8 space-y-4 mb-10">${d.items.map(i => `<div class="flex justify-between font-bold uppercase text-xs"><span>${i.qty}x ${i.name}</span><span>${i.qty * i.price} AED</span></div>`).join('')}</div>
                        <div class="flex justify-between items-end border-t border-white/10 pt-8"><span class="text-xl font-black italic uppercase">Total</span><span class="text-4xl font-black text-purple-500 tracking-tighter">${d.total} AED</span></div>
                    </div>`;
            }
            return true;
        }

        window.setTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            renderGrid();
        };

        window.renderGrid = () => {
            const filtered = snacks.filter(s => currentTab === 'all' || s.category === currentTab);
            document.getElementById('snack-grid').innerHTML = filtered.map(s => `
                <div id="snack-${s.id}" onclick="handleCardClick(${s.id})" class="snack-card w-full bg-[#0c0c0c] border border-white/5 rounded-[3rem] overflow-hidden flex flex-col">
                    <div class="image-container">
                        <img src="${s.img}" class="snack-shadow ${s.isBoba ? 'boba-adjust' : ''} ${s.isTiger ? 'tiger-milk-pos' : ''}" crossorigin="anonymous">
                        <div class="absolute top-8 left-8 bg-black/40 backdrop-blur-xl border border-white/10 px-5 py-2 rounded-2xl font-black italic text-xs tracking-tighter z-10">${s.price} AED</div>
                    </div>
                    <div class="p-8 flex-grow">
                        <h3 class="text-3xl font-black italic uppercase mb-2 tracking-tighter leading-tight">${s.name}</h3>
                        <p class="text-white/30 text-[10px] mb-8 italic uppercase tracking-wider font-bold">${s.desc}</p>
                        <button onclick="event.stopPropagation(); addToCart(${s.id})" class="w-full py-5 bg-white text-black font-black uppercase italic text-[10px] rounded-2xl tap-active">Add To Bag</button>
                    </div>
                </div>
            `).join('');
        };

        window.handleCardClick = (id) => {
            document.querySelectorAll('.snack-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`snack-${id}`).classList.add('selected');
        };

        window.addToCart = (id) => {
            const item = snacks.find(s => s.id === id);
            const exists = cart.find(c => c.id === id);
            if (exists) exists.qty++; else cart.push({...item, qty: 1});
            updateUI();
            showToast("Added to bag");
        };

        window.changeQty = (id, delta) => {
            const item = cart.find(c => c.id === id);
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
            updateUI();
        };

        function updateUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            let total = 0, count = 0;
            list.innerHTML = cart.length === 0 ? '<div class="py-20 text-center opacity-10 font-black uppercase italic tracking-[0.5em]">Empty</div>' : 
                cart.map(c => {
                    total += (c.price * c.qty);
                    count += c.qty;
                    return `<div class="flex gap-4 items-center bg-white/[0.03] p-5 rounded-[2rem] border border-white/5"><div class="w-16 h-16 bg-neutral-900 rounded-2xl p-2"><img src="${c.img}" class="max-w-full max-h-full object-contain" crossorigin="anonymous"></div><div class="flex-grow"><h4 class="font-black italic uppercase text-[10px] mb-0.5">${c.name}</h4><p class="text-purple-500 font-black text-xs">${c.price * c.qty} AED</p></div><div class="flex items-center gap-3"><button onclick="changeQty(${c.id},-1)" class="w-8 h-8 bg-white/5 rounded-xl flex items-center justify-center"><i class="fas fa-minus text-[8px]"></i></button><span class="text-xs font-black w-4 text-center">${c.qty}</span><button onclick="changeQty(${c.id},1)" class="w-8 h-8 bg-white/5 rounded-xl flex items-center justify-center"><i class="fas fa-plus text-[8px]"></i></button></div></div>`;
                }).join('');
            totalEl.innerText = `${total} AED`;
            countEl.innerText = count;
            countEl.classList.toggle('hidden', count === 0);
            document.getElementById('step-btn').disabled = cart.length === 0;
        }

        window.toggleCart = () => {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            if (!sidebar.classList.contains('open')) {
                sidebar.classList.add('open');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                sidebar.classList.remove('open');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 500);
            }
        };

        window.nextStep = () => {
            document.getElementById('cart-items').classList.add('hidden');
            document.getElementById('checkout-fields').classList.remove('hidden');
            document.getElementById('step-btn').classList.add('hidden');
            document.getElementById('final-btn').classList.remove('hidden');
            document.getElementById('back-btn').classList.remove('hidden');
        };

        window.prevStep = () => {
            document.getElementById('cart-items').classList.remove('hidden');
            document.getElementById('checkout-fields').classList.add('hidden');
            document.getElementById('step-btn').classList.remove('hidden');
            document.getElementById('final-btn').classList.add('hidden');
            document.getElementById('back-btn').classList.add('hidden');
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function start() {
            await signInAnonymously(auth);
            const showingReceipt = await checkReceipt();
            
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
            if (!isStandalone && !showingReceipt) {
                document.getElementById('webapp-prompt').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('loader').style.display = 'none';
                return;
            }

            document.getElementById('nav-logo').src = getDriveImg(LOGO_ID);
            document.getElementById('load-logo').src = getDriveImg(LOGO_ID);
            document.getElementById('prompt-logo').src = getDriveImg(WEBAPP_ICON_ID); 
            renderGrid();
            setTimeout(() => document.getElementById('loader').classList.add('fade-out'), 2500);
        }
        start();
    </script>
</body>
</html>
